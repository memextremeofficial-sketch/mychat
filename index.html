<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safe Chat Base</title>

<style>
body { margin:0; font-family:Arial; background:#0f0f0f; color:white; }
.hidden { display:none; }
#home { padding:10px; }
input { padding:10px; width:70%; }
button { padding:10px; margin:5px; }
.box { background:#1e1e1e; padding:10px; margin-top:10px; border-radius:10px; }
</style>

<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-database-compat.js"></script>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h3>Safe Chat</h3>
  <input id="name" placeholder="Enter name">
  <button onclick="start()">Start</button>
</div>

<!-- HOME -->
<div id="home" class="hidden">
  <div class="box">
    Your ID: <b id="myId"></b>
  </div>
</div>

<script>
/* ---------------- FIREBASE INIT ---------------- */
firebase.initializeApp({
  apiKey: "AIzaSyAoTdvfNM1Z5FJEaZLwUi8TLEp6zGtlOU",
  databaseURL: "https://super-chat-c4f3d-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "super-chat-c4f3d"
});

const db = firebase.database();

/* ---------------- STATE ---------------- */
let myId = null;
let myName = localStorage.getItem("name") || "";
let started = false;

/* ---------------- AUTH ---------------- */
firebase.auth().signInAnonymously()
.then(() => console.log("Auth OK"))
.catch(err => console.error(err));

firebase.auth().onAuthStateChanged(user => {
  if (!user) return;

  myId = user.uid;
  document.getElementById("myId").innerText = myId;

  if (myName) {
    document.getElementById("name").value = myName;
  }
});

/* ---------------- START ---------------- */
function start() {
  if (started) return;

  myName = document.getElementById("name").value;
  if (!myName) return;

  started = true;
  localStorage.setItem("name", myName);

  db.ref("users/" + myId).set({
    name: myName,
    online: true
  });

  db.ref("ids/" + myId).set(true);

  document.getElementById("login").classList.add("hidden");
  document.getElementById("home").classList.remove("hidden");
}
</script>

</body>
</html>
