<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Chat Pro</title>

<style>
body { margin:0; font-family: Arial; background:#0f0f0f; color:white; }

#home, #chat { padding:10px; }

.hidden { display:none; }

.box { background:#1e1e1e; padding:10px; margin:6px 0; border-radius:10px; }

input { padding:10px; width:75%; }
button { padding:8px; margin:4px; }

/* CHAT */
#messages {
  height:60vh;
  overflow:auto;
  background:#151515;
  padding:10px;
  border-radius:10px;
}

.msg {
  max-width:70%;
  padding:10px;
  margin:6px 0;
  border-radius:12px;
  font-size:14px;
  word-break:break-word;
}

.me { background:white; color:black; margin-left:auto; }
.them { background:black; color:white; margin-right:auto; }

.time { font-size:10px; opacity:0.6; margin-top:3px; }

.small { font-size:12px; opacity:0.7; }

img { max-width:200px; border-radius:10px; }
audio { width:200px; }

.status { font-size:11px; opacity:0.6; }
</style>

<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-database-compat.js"></script>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<h3>Super Chat</h3>
<input id="name" placeholder="Naam" autocomplete="off">
<button onclick="start()">Start</button>
</div>

<!-- HOME -->
<div id="home" class="hidden">

<p>Your ID: <b id="myId"></b></p>

<h4>Add friend</h4>
<input id="friendId">
<button onclick="addFriend()">Send</button>

<h4>Requests</h4>
<div id="requests"></div>

<h4>Friends</h4>
<div id="friends"></div>

</div>

<!-- CHAT -->
<div id="chat" class="hidden">

<button onclick="back()">⬅</button>
<button onclick="deleteChat()">🗑 Chat verwijderen</button>

<div id="messages"></div>

<input id="msg">
<button onclick="sendMsg()">Send</button>

<br>

<button onclick="imgPick()">📷</button>
<input type="file" id="img" hidden onchange="sendImg(event)">

<button onclick="filePick()">📁</button>
<input type="file" id="file" hidden onchange="sendFile(event)">

<button onclick="toggleRec()">🎙️</button>

<div class="small" id="typing"></div>

</div>

<script>

/* FIREBASE */
firebase.initializeApp({
  apiKey: "AIzaSyAoTdvfNM1Z5FJEaZLwUi8TLEp6zGtlOU",
  databaseURL: "https://super-chat-c4f3d-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "super-chat-c4f3d"
});

const db = firebase.database();

let myId = null;

firebase.auth().signInAnonymously()
.then(() => {
  console.log("Anonymous auth successful");
})
.catch(error => {
  console.error("Auth error:", error);
});

firebase.auth().onAuthStateChanged(user => {
  if (!user) return;

  myId = user.uid;

  document.getElementById("myId").innerText = myId;

  if (myName) {
    start();
  }
});
}

let myName = localStorage.getItem("name") || "";
let currentChat = null;
let started = false;
document.getElementById("myId").innerText = myId;
window.onload = () => {

  document.getElementById("name").value = myName;
};
/* START */
function start(){
if (started) return;
started = true;

if (!myId) {
  started = false;
  return;
}
  myName = document.getElementById("name").value;
  if(!myName) return;

  localStorage.setItem("name", myName);

  db.ref("ids/" + myId).set(true);

  db.ref("users/"+myId).set({
    name: myName,
    online: true
  });
  document.getElementById("login").classList.add("hidden");
  document.getElementById("home").classList.remove("hidden");

  document.getElementById("myId").innerText=myId;

  listen();
}

/* FRIEND REQUEST */
function addFriend(){
  const id=document.getElementById("friendId").value;

  db.ref("requests/"+id+"/"+myId).set({name:myName});
}

/* LISTEN REQUESTS */
function listen(){
  db.ref("requests/"+myId).on("value",s=>{
    const d=s.val()||{};
    const box=document.getElementById("requests");
    box.innerHTML="";

    Object.keys(d).forEach(id=>{
      const div=document.createElement("div");
      div.className="box";
      div.innerHTML=`${d[id].name}
      <button onclick="accept('${id}')">Accept</button>`;
      box.appendChild(div);
    });
  });

  db.ref("users/"+myId+"/friends").on("value",s=>{
    const d=s.val()||{};
    const box=document.getElementById("friends");
    box.innerHTML="";

    Object.keys(d).forEach(id=>{
      db.ref("users/"+id).once("value").then(u=>{
        const div=document.createElement("div");
        div.className="box";
        div.innerHTML=`
        ${u.val().name}
        <button onclick="openChat('${id}')">Chat</button>`;
        box.appendChild(div);
      });
    });
  });
}

function accept(id){
  db.ref("users/"+myId+"/friends/"+id).set(true);
  db.ref("users/"+id+"/friends/"+myId).set(true);
  db.ref("requests/"+myId+"/"+id).remove();
}

/* CHAT OPEN */
function openChat(id){
  currentChat=id;

  document.getElementById("home").classList.add("hidden");
  document.getElementById("chat").classList.remove("hidden");

  const path=chatId();

  db.ref("chats/"+path).off();
document.getElementById("messages").innerHTML = "";
  db.ref("chats/"+path).on("child_added",s=>{
    const m=s.val();

    const div=document.createElement("div");
    const me=m.sender===myName;

    div.className="msg "+(me?"me":"them");

    let t = "";

if(m.time){
  const d = new Date(m.time);

  const h = String(d.getHours()).padStart(2, "0");
const min = String(d.getMinutes()).padStart(2, "0");

t = h + ":" + min;
}

    let html="";

    if(m.type==="text"){
  html = m.text.replace(
    /(https?:\/\/[^\s]+)/g,
    '<a href="$1" target="_blank">$1</a>'
  );
}
    if(m.type==="image") html=`<img src="${m.data}">`;

if(m.type==="file")
html=`📁 <a href="${m.data}" target="_blank">${m.name}</a>`;

if(m.type==="audio")
html=`<audio controls src="${m.data}"></audio>`;

if(m.type==="video")
html=`<video controls playsinline width="250" src="${m.data}"></video>`;
    if(m.type==="video")
    html=`<video controls playsinline width="220" src="${m.data}"></video>`;
    div.innerHTML=`
    ${html}
    <div class="time">${t}</div>
    <div class="status">${m.status||""}</div>
    `;

    const messages = document.getElementById("messages");

messages.appendChild(div);

messages.scrollTop = messages.scrollHeight;
  });

  typingListener();
}

/* SEND */
function sendMsg(){
  const text=document.getElementById("msg").value;
  if(!text) return;

  push({type:"text",text});
  document.getElementById("msg").value="";
}

function push(data){
  db.ref("chats/"+chatId()).push({
    ...data,
    sender:myName,
    time:Date.now(),
    status:"✓"
  });
}

/* CHAT ID */
function chatId(){
  return [myId,currentChat].sort().join("_");
}
/* BACK */
function back(){
  document.getElementById("chat").classList.add("hidden");
  document.getElementById("home").classList.remove("hidden");
}

function deleteChat(){
  if(!confirm("Chat verwijderen?")) return;

  const path = chatId();

  db.ref("chats/" + path).remove();

  // optioneel: relatie verwijderen
  db.ref("users/" + myId + "/friends/" + currentChat).remove();
  db.ref("users/" + currentChat + "/friends/" + myId).remove();

  document.getElementById("messages").innerHTML = "";
  currentChat = null;

  back();
}
/* IMAGE */
function imgPick(){ document.getElementById("img").click(); }

function sendImg(e){
  const f=e.target.files[0];
  const r=new FileReader();

  r.onload=()=>{
    push({type:"image",data:r.result});
  };

  r.readAsDataURL(f);
}

/* FILE */
function filePick(){ document.getElementById("file").click(); }

function sendFile(e){
  const f=e.target.files[0];
  const r=new FileReader();

  r.onload=()=>{
    if(f.type.startsWith("video/")){
  push({
    type:"video",
    data:r.result,
    name:f.name
  });
}else{
  push({
    type:"file",
    data:r.result,
    name:f.name
  });
}
  };

  r.readAsDataURL(f);
}

/* AUDIO */
let rec,ch=[];

function toggleRec(){
  if(rec&&rec.state==="recording"){rec.stop();return;}

  navigator.mediaDevices.getUserMedia({audio:true}).then(s=>{
    rec=new MediaRecorder(s);
    ch=[];

    rec.ondataavailable=e=>ch.push(e.data);

    rec.onstop=()=>{
      const b=new Blob(ch,{type:"audio/webm"});
      const r=new FileReader();

      r.onload=()=>{
        push({type:"audio",data:r.result});
      };

      r.readAsDataURL(b);
    };

    rec.start();
  });
}

/* TYPING */
function typingListener(){
  const input=document.getElementById("msg");

  input.oninput=()=>{
    db.ref("typing/"+chatId()).set(myName+" is typing...");

    setTimeout(()=>{
      db.ref("typing/"+chatId()).remove();
    },1000);
  };

  db.ref("typing/"+chatId()).on("value",s=>{
    const v=s.val();
    document.getElementById("typing").innerText=v||"";
  });
}

</script>

</body>
</html>
