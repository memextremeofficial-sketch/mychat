<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Base</title>
</head>

<body>

<h3>Chat Base Test</h3>

<input id="name" placeholder="Enter name">
<button id="start">Start</button>

<p>Your ID:</p>
<pre id="uid">loading...</pre>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getAuth, signInAnonymously, onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

import { getDatabase, ref, set }
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAoTdvfNM1Z5FJEaZLwUi8TLEp6zGtlOU",
  authDomain: "super-chat-c4f3d.firebaseapp.com",
  databaseURL: "https://super-chat-c4f3d-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "super-chat-c4f3d",
  appId: "1:836747839041:web:095657e71616d2aee2a8c0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let uid = null;
let name = "";

signInAnonymously(auth);

onAuthStateChanged(auth, (user) => {
  if (!user) return;

  uid = user.uid;
  document.getElementById("uid").innerText = uid;
});

document.getElementById("start").onclick = () => {
  name = document.getElementById("name").value;
  if (!name || !uid) return;

  set(ref(db, "users/" + uid), {
    name: name,
    online: true
  });

  alert("Saved to Firebase!");
};

</script>

</body>
</html>
